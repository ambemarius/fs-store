services:
  - type: web
    name: shore-store-backend
    env: node
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 2121
      - key: MONGO_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true

  - type: web
    name: shore-store-frontend
    env: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shore-store-backend
          property: host
