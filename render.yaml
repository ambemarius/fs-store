services:
  - type: web
    name: shore-store-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 2121
      - key: MONGO_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true

  - type: static
    name: shore-store-frontend
    env: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    publishPath: frontend/dist
    plan: free
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shore-store-backend
          property: host
